name: Unzip Upload
on:
  push:
    branches:
      - main
    paths:
      - '**/*.zip'
jobs:
  unzip:
    runs-on:  'ubuntu-latest steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip file
        run: |
          unzip mmorpg_upload_ready.zip -d extracted

      - name: Show files
        run: ls -R extracted'
